name: CI/CD Ropium

on:
  push:
    branches: ["main"]

jobs:
  push_to_registry:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_PASS }}" | docker login -u "${{ secrets.DOCKERHUB_USER }}" --password-stdin

      - name: Build & Push Monolito Django
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USER }}/tienda-monolito:latest .
          docker push ${{ secrets.DOCKERHUB_USER }}/tienda-monolito:latest

      - name: Build & Push Microservicio Flask
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USER }}/ms-pagos:latest ./flask_order_service
          docker push ${{ secrets.DOCKERHUB_USER }}/ms-pagos:latest

      - name: Build & Push Nginx Gateway
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USER }}/nginx-gateway:latest -f Dockerfile.nginx .
          docker push ${{ secrets.DOCKERHUB_USER }}/nginx-gateway:latest